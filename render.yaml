services:
  # Backend Web Service
  - type: web
    name: wastezero-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL # Set your MongoDB Atlas URI in Render dashboard
        sync: false
      - key: JWT_SECRET # Set your secret in Render dashboard
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL # Set this to your frontend URL after deployment
        sync: false
      - key: EMAIL_USER 
        sync: false
      - key: EMAIL_PASS 
        sync: false
      - key: ADMIN_SECURITY_CODE 
        sync: false

  # Frontend Static Site
  - type: web
    name: wastezero-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL # Set this to your backend URL after deployment
        sync: false
